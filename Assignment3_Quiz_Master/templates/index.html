<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Master</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page home-page">
        <div class="hero">
            <div class="hero-badge">Lightning Brain</div>
            <h1 class="hero-title">Quiz<span class="accent">Master</span></h1>
            <p class="hero-subtitle">Test your knowledge!</p>

            <div class="stats-row">
                <div class="stat-card">
                    <span class="stat-num">10</span>
                    <span class="stat-label">Questions</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num">4+</span>
                    <span class="stat-label">Topics</span>
                </div>
                <div class="stat-card">
                    <span class="stat-num">15</span>
                    <span class="stat-label">Minutes</span>
                </div>
            </div>

            <a href="/quiz" class="btn-start">
                <span>Start Quiz</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            </a>

            
        </div>

        <div class="decor-circle c1"></div>
        <div class="decor-circle c2"></div>
        <div class="decor-circle c3"></div>
    </div>
</body>
</html>
