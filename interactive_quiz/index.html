<!DOCTYPE html>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Interactive Quiz</title>


<link rel="stylesheet" href="style.css">
</head>


<body>


<header>
<h1>🧠 Smart Interactive Quiz</h1>
<p>Answer simple questions and test your basics!</p>
</header>


<div class="card" id="quizBox">
<h2 id="question"></h2>
<div id="options"></div>
<button class="btn" id="nextBtn">Next Question</button>
</div>


<div class="card hidden" id="resultBox">
<h2>Quiz Completed 🎉</h2>
<p id="scoreText"></p>
<p id="message"></p>
<button class="btn" id="restartBtn">Restart Quiz</button>
</div>


<script src="script.js"></script>
</body>
</html>
