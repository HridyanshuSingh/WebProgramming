{% extends "base.html" %}
{% block title %}EventHub — Register{% endblock %}

{% block content %}

<section class="page-header">
  <div class="section-container">
    <h1>Register for an Event</h1>
    <p>Fill in your details below to secure your spot</p>
  </div>
</section>

<section class="form-section">
  <div class="form-container">
    <div class="form-card">
      <h2 class="form-title">🎟️ Event Registration</h2>

      <!-- Client-side validation errors shown here -->
      <div id="formErrors" class="form-errors" style="display:none;"></div>

      <form id="registrationForm" method="POST" action="{{ url_for('register') }}" novalidate>

        <!-- Full Name -->
        <div class="form-group">
          <label for="name" class="form-label">Full Name <span class="required">*</span></label>
          <input type="text" id="name" name="name" class="form-input" placeholder="Enter your full name" />
          <span class="field-error" id="nameError"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email" class="form-label">Email Address <span class="required">*</span></label>
          <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" />
          <span class="field-error" id="emailError"></span>
        </div>

        <!-- Phone -->
        <div class="form-group">
          <label for="phone" class="form-label">Phone Number <span class="required">*</span></label>
          <input type="tel" id="phone" name="phone" class="form-input" placeholder="10-digit mobile number" maxlength="10" />
          <span class="field-error" id="phoneError"></span>
        </div>

        <!-- Event Selection -->
        <div class="form-group">
          <label for="event_id" class="form-label">Select Event <span class="required">*</span></label>
          <select id="event_id" name="event_id" class="form-input form-select">
            <option value="">-- Choose an Event --</option>
            {% for event in events %}
              <option value="{{ event.id }}"
                {% if pre_select and pre_select|int == event.id %}selected{% endif %}>
                {{ event.name }} ({{ event.date }})
              </option>
            {% endfor %}
          </select>
          <span class="field-error" id="eventError"></span>
        </div>

        <!-- Tickets -->
        <div class="form-group">
          <label for="tickets" class="form-label">Number of Tickets <span class="required">*</span></label>
          <input type="number" id="tickets" name="tickets" class="form-input" min="1" max="10" value="1" />
          <span class="field-error" id="ticketsError"></span>
        </div>

        <button type="submit" class="btn btn-primary btn-full" id="submitBtn">
          Confirm Registration 🎉
        </button>
      </form>
    </div>
  </div>
</section>

{% endblock %}
