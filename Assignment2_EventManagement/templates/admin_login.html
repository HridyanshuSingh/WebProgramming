{% extends "base.html" %}
{% block title %}EventHub — Admin Login{% endblock %}

{% block content %}
<section class="form-section">
  <div class="form-container" style="max-width:420px;">
    <div class="form-card">
      <h2 class="form-title">🔐 Admin Login</h2>
      <p style="text-align:center;color:var(--text-muted);margin-bottom:1.5rem;">
        Default password: <code>admin123</code>
      </p>
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="Enter admin password" autofocus />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Login</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
