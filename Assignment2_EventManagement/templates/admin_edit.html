{% extends "base.html" %}
{% block title %}EventHub — Edit Event{% endblock %}

{% block content %}
<section class="page-header">
  <div class="section-container">
    <h1>✏️ Edit Event</h1>
  </div>
</section>

<div class="admin-layout" style="max-width:700px;margin:0 auto;">
  <section class="admin-form-section">
    <div class="admin-card">
      <form method="POST">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Event Name</label>
            <input type="text" name="name" class="form-input" value="{{ event.name }}" required />
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select name="category" class="form-input form-select">
              {% for cat in ['Technology','Music','Business','Art','Health','General'] %}
              <option {% if cat == event.category %}selected{% endif %}>{{ cat }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Date</label>
            <input type="date" name="date" class="form-input" value="{{ event.date }}" required />
          </div>
          <div class="form-group">
            <label class="form-label">Time</label>
            <input type="text" name="time" class="form-input" value="{{ event.time }}" />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Venue</label>
          <input type="text" name="venue" class="form-input" value="{{ event.venue }}" required />
        </div>
        <div class="form-group">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-input form-textarea" rows="3">{{ event.description }}</textarea>
        </div>
        <div class="form-group">
          <label class="form-label">Image URL</label>
          <input type="url" name="image_url" class="form-input" value="{{ event.image_url }}" />
        </div>
        <div style="display:flex;gap:1rem;">
          <button type="submit" class="btn btn-primary">Save Changes ✅</button>
          <a href="{{ url_for('admin') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </section>
</div>
{% endblock %}
