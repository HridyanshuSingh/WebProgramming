{% extends "base.html" %}

{% block title %}New Post — Simple Blog{% endblock %}

{% block content %}
<div class="form-page">

  <div class="form-header">
    <h1 class="form-title">New Post</h1>
    <p class="form-sub">Fill in the fields below and hit <em>Publish</em>.</p>
  </div>

  <!-- POST to /create -->
  <form class="post-form" action="{{ url_for('create') }}" method="POST">

    <div class="field-group">
      <label class="field-label" for="title">Post Title</label>
      <input
        class="field-input"
        type="text"
        id="title"
        name="title"
        placeholder="Give your post a punchy title…"
        required
        autofocus
      />
    </div>

    <div class="field-group">
      <label class="field-label" for="content">Content</label>
      <textarea
        class="field-textarea"
        id="content"
        name="content"
        rows="10"
        placeholder="Write your thoughts here…"
        required
      ></textarea>
    </div>

    <div class="form-footer">
      <a href="{{ url_for('index') }}" class="btn btn-secondary">← Cancel</a>
      <button type="submit" class="btn btn-primary">Publish Post</button>
    </div>

  </form>
</div>
{% endblock %}
