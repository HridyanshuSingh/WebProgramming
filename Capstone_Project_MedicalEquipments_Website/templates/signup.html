{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">⚕</div>
      <h1>Create Account</h1>
      <p>Join MediEquip Pro to manage your inquiries</p>
    </div>
    <form method="POST">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="Dr. / Mr. / Ms. Full Name"/>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" name="email" required placeholder="you@hospital.com"/>
        </div>
        <div class="form-group">
          <label>Phone (optional)</label>
          <input type="tel" name="phone" placeholder="+91 9876543210"/>
        </div>
      </div>
      <div class="form-group">
        <label>Password <small>(min 6 characters)</small></label>
        <input type="password" name="password" required placeholder="Choose a strong password"/>
      </div>
      <button type="submit" class="btn-primary w-full">Create Account →</button>
    </form>
    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Login</a>
    </div>
  </div>
</section>
{% endblock %}
