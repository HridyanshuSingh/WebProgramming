<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic To-Do List</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Dynamic To-Do List</h1>
      <p class="subtitle">Stay organized and productive</p>
    </header>

    <main class="main-content">
      <!-- Add Todo Form -->
      <section class="add-todo-section">
        <h2>Add New Task</h2>
        <form id="addTodoForm" class="form">
          <div class="form-group">
            <label for="todoTitle">Task Title *</label>
            <input type="text" id="todoTitle" placeholder="Enter task title" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="todoDescription">Description</label>
              <input type="text" id="todoDescription" placeholder="Enter task description">
            </div>
            <div class="form-group">
              <label for="todoDueDate">Due Date</label>
              <input type="date" id="todoDueDate">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="todoPriority">Priority</label>
              <select id="todoPriority">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
              </select>
            </div>
            <button type="submit" class="btn btn-primary">Add Task</button>
          </div>
        </form>
      </section>

      <!-- Filter Section -->
      <section class="filter-section">
        <h2>Filter Tasks</h2>
        <div class="filter-buttons">
          <button class="filter-btn active" data-filter="all">All Tasks</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
          <button class="filter-btn" data-filter="high">High Priority</button>
          <button class="filter-btn" data-filter="medium">Medium Priority</button>
          <button class="filter-btn" data-filter="low">Low Priority</button>
        </div>
      </section>

      <!-- Counter Section -->
      <section class="counter-section">
        <div class="counter-item">
          <span class="counter-label">Total Tasks</span>
          <span class="counter-value" id="totalCount">0</span>
        </div>
        <div class="counter-item">
          <span class="counter-label">Completed</span>
          <span class="counter-value" id="completedCount">0</span>
        </div>
        <div class="counter-item">
          <span class="counter-label">Pending</span>
          <span class="counter-value" id="pendingCount">0</span>
        </div>
        <div class="counter-item">
          <span class="counter-label">High Priority</span>
          <span class="counter-value" id="highPriorityCount">0</span>
        </div>
      </section>

      <!-- Todos List -->
      <section class="todos-section">
        <h2>Tasks</h2>
        <div id="todosList" class="todos-list">
          <p class="empty-message">No tasks yet. Add one to get started!</p>
        </div>
      </section>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
