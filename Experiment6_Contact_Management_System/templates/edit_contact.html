{% extends "base.html" %}
{% block title %}Edit Contact – ContactVault{% endblock %}

{% block content %}

<h1>Edit Contact</h1>
<p class="page-subtitle">Update the details for <strong style="color:var(--accent)">{{ contact.name }}</strong>.</p>

<div class="form-card">

  {% if error %}
    <div class="alert alert-error">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('edit_contact', contact_id=contact.id) }}">

    <div class="form-group">
      <label for="name">Full Name</label>
      <input
        type="text"
        id="name"
        name="name"
        value="{{ request.form.get('name', contact.name) }}"
        required
      />
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        value="{{ request.form.get('phone', contact.phone) }}"
        required
      />
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input
        type="email"
        id="email"
        name="email"
        value="{{ request.form.get('email', contact.email) }}"
        required
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Update Contact</button>
      <a href="{{ url_for('index') }}" class="btn btn-edit">Cancel</a>
    </div>

  </form>
</div>

{% endblock %}
