{% extends "base.html" %}
{% block title %}Add Contact – ContactVault{% endblock %}

{% block content %}

<h1>Add New Contact</h1>
<p class="page-subtitle">Fill in the details below to save a new contact.</p>

<div class="form-card">

  {% if error %}
    <div class="alert alert-error">⚠ {{ error }}</div>
  {% endif %}

  <form method="POST" action="{{ url_for('add_contact') }}">

    <div class="form-group">
      <label for="name">Full Name</label>
      <input
        type="text"
        id="name"
        name="name"
        placeholder="e.g. Alice Johnson"
        value="{{ request.form.get('name', '') }}"
        required
      />
    </div>

    <div class="form-group">
      <label for="phone">Phone Number</label>
      <input
        type="tel"
        id="phone"
        name="phone"
        placeholder="e.g. 9876543210"
        value="{{ request.form.get('phone', '') }}"
        required
      />
    </div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input
        type="email"
        id="email"
        name="email"
        placeholder="e.g. alice@example.com"
        value="{{ request.form.get('email', '') }}"
        required
      />
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Contact</button>
      <a href="{{ url_for('index') }}" class="btn btn-edit">Cancel</a>
    </div>

  </form>
</div>

{% endblock %}
