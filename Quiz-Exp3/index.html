<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CSE BrainBoost Quiz</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>💻 CSE BrainBoost Quiz</h1>
    <p class="intro">
        This quiz tests basic Computer Science knowledge for B.Tech CSE students.
        Select the correct answer and click Next.
    </p>
</header>

<main class="quiz-box">

    <section id="quiz-section">
        <h2 id="question">Question will appear here</h2>
        <form id="options"></form>
        <button id="nextBtn" type="button">Next</button>
    </section>

    <section id="result-section" class="hide">
        <h2 id="final-score"></h2>
        <p id="feedback"></p>
        <button id="restartBtn" type="button">Restart Quiz</button>
    </section>

</main>

<script src="script.js"></script>
</body>
</html>
